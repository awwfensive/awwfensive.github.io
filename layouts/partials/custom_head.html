<script src="https://cdn.jsdelivr.net/gh/adryd325/oneko.js@latest/oneko.js" defer data-cat="/oneko.gif"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">

<style>
  :root {
    color-scheme: light;
    --bg: #fffdfa;
    --surface: #ffffff;
    --surface-2: #f7f7f4;
    --text: #111111;
    --muted: #646464;
    --faint: #deded8;
    --accent: #ff6666;
    --accent-strong: #e84747;
    --blue: #315fd6;
    --green: #0f8b5f;
    --shadow: 0 18px 55px rgba(20, 20, 20, 0.08);
  }

  * {
    box-sizing: border-box;
  }

  html {
    scroll-behavior: smooth;
  }

  body {
    min-height: 100vh;
    max-width: 820px;
    margin: 0 auto;
    padding: 24px clamp(16px, 4vw, 34px) 42px;
    background:
      linear-gradient(90deg, rgba(255, 102, 102, 0.08) 1px, transparent 1px),
      linear-gradient(0deg, rgba(49, 95, 214, 0.055) 1px, transparent 1px),
      var(--bg);
    background-size: 42px 42px;
    color: var(--text);
    font-family: 'Roboto Mono', monospace;
    font-size: 16px;
    line-height: 1.7;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background: linear-gradient(180deg, rgba(255, 253, 250, 0.96), rgba(255, 253, 250, 0.82) 28%, rgba(255, 253, 250, 0.96));
    z-index: -1;
  }

  ::selection {
    background-color: #b3d9ff;
    color: #000000;
  }

  h1,
  h2,
  h3,
  h4,
  h5,
  h6,
  p,
  li,
  span,
  div {
    color: var(--text);
    font-family: 'Roboto Mono', monospace;
  }

  h1 {
    margin: 0 0 1rem;
    font-size: clamp(1.9rem, 4vw, 2.45rem);
    line-height: 1.16;
  }

  h2 {
    margin-top: 2.4rem;
    font-size: 1.35rem;
  }

  h3 {
    margin-top: 1.7rem;
    font-size: 1.12rem;
  }

  p {
    margin: 1rem 0;
  }

  strong,
  b {
    font-weight: 700;
    color: var(--text) !important;
  }

  a {
    color: var(--text) !important;
    text-decoration: none !important;
    border-bottom: 2px solid var(--accent);
    padding-bottom: 2px;
    transition: border-color 160ms ease, background-color 160ms ease, transform 160ms ease;
  }

  a:hover,
  a:focus-visible {
    border-bottom-color: var(--accent-strong);
    background: rgba(255, 102, 102, 0.12);
  }

  a:focus-visible,
  button:focus-visible {
    outline: 2px solid var(--blue);
    outline-offset: 4px;
  }

  body > header {
    position: sticky;
    top: 0;
    z-index: 20;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    margin: -24px calc(clamp(16px, 4vw, 34px) * -1) 2.2rem;
    padding: 18px clamp(16px, 4vw, 34px);
    border-bottom: 1px solid var(--faint);
    background: rgba(255, 253, 250, 0.88);
    backdrop-filter: blur(16px);
  }

  .title {
    display: inline-flex;
    align-items: center;
    border-bottom: 0;
    padding-bottom: 0;
    white-space: nowrap;
  }

  .title::before {
    content: "";
    width: 10px;
    height: 10px;
    margin-right: 0.65rem;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 0 6px rgba(255, 102, 102, 0.12);
  }

  .title h2 {
    margin: 0;
    font-size: 1rem;
    letter-spacing: 0;
  }

  header nav {
    display: flex;
    flex-wrap: wrap;
    justify-content: flex-end;
    gap: 0.45rem;
  }

  header nav a {
    border: 1px solid transparent;
    border-radius: 999px;
    padding: 0.35rem 0.65rem;
    color: var(--muted) !important;
  }

  header nav a:hover,
  header nav a:focus-visible,
  header nav a[aria-current="page"] {
    border-color: var(--faint);
    background: var(--surface);
    color: var(--text) !important;
    box-shadow: 0 8px 24px rgba(20, 20, 20, 0.06);
  }

  body > main {
    animation: page-in 420ms ease both;
  }

  @keyframes page-in {
    from {
      opacity: 0;
      transform: translateY(8px);
    }

    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .intro {
    padding: 1.4rem 0 0.3rem;
  }

  .intro-lede {
    max-width: 64ch;
    margin-top: 0;
    font-size: 1.04rem;
  }

  .status-pill,
  .tag {
    display: inline-flex;
    align-items: center;
    min-height: 28px;
    border: 1px solid var(--faint);
    border-radius: 999px;
    padding: 0.16rem 0.62rem;
    background: var(--surface);
    color: var(--green) !important;
    font-size: 0.85rem;
    box-shadow: 0 8px 22px rgba(20, 20, 20, 0.05);
  }

  .quick-links,
  .social-links {
    display: flex;
    flex-wrap: wrap;
    gap: 0.7rem;
    margin: 1.35rem 0;
    padding: 0;
    list-style: none;
  }

  .quick-links a,
  .social-links a {
    display: inline-flex;
    align-items: center;
    min-height: 42px;
    border: 1px solid var(--faint);
    border-radius: 8px;
    padding: 0.55rem 0.72rem;
    background: var(--surface);
    box-shadow: 0 10px 26px rgba(20, 20, 20, 0.04);
  }

  .quick-links a:hover,
  .social-links a:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow);
  }

  .note {
    margin: 1.25rem 0;
    padding: 0.95rem 1rem;
    border-left: 3px solid var(--accent);
    background: rgba(255, 255, 255, 0.72);
  }

  .experience-thread {
    position: relative;
    display: grid;
    gap: 0.85rem;
    margin: 1.55rem 0;
    padding-left: 1.35rem;
  }

  .experience-thread::before {
    content: "";
    position: absolute;
    top: 0.55rem;
    bottom: 0.55rem;
    left: 0.28rem;
    width: 2px;
    background: linear-gradient(var(--blue), var(--accent));
    opacity: 0.55;
  }

  .thread-item {
    position: relative;
    min-height: 78px;
    border: 1px solid var(--faint);
    border-radius: 8px;
    padding: 0.78rem 0.9rem;
    background: rgba(255, 255, 255, 0.82);
    box-shadow: 0 8px 26px rgba(20, 20, 20, 0.04);
  }

  .thread-item::before {
    content: "";
    position: absolute;
    top: 1rem;
    left: -1.52rem;
    width: 10px;
    height: 10px;
    border: 2px solid var(--surface);
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 0 5px rgba(255, 102, 102, 0.14);
  }

  .thread-now::before {
    background: var(--blue);
    box-shadow: 0 0 0 5px rgba(49, 95, 214, 0.13);
  }

  .thread-kicker {
    display: block;
    margin-bottom: 0.2rem;
    color: var(--muted) !important;
    font-size: 0.72rem;
  }

  .thread-item h2 {
    margin: 0;
    font-size: 1rem;
    line-height: 1.35;
  }

  .thread-item p {
    margin: 0.28rem 0 0;
    color: var(--muted) !important;
    font-size: 0.92rem;
  }

  .post-list,
  .project-list {
    display: grid;
    gap: 0.85rem;
    margin: 1.5rem 0 0;
    padding: 0;
    list-style: none;
  }

  .post-item,
  .project-item {
    position: relative;
  }

  .post-card,
  .project-card {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 0.45rem 0.8rem;
    width: 100%;
    min-height: 72px;
    border: 1px solid var(--faint);
    border-radius: 8px;
    padding: 0.85rem 1rem;
    background: rgba(255, 255, 255, 0.82);
    box-shadow: 0 8px 26px rgba(20, 20, 20, 0.04);
  }

  .post-card:hover,
  .project-card:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow);
  }

  .post-date,
  .single-date {
    color: var(--blue) !important;
    font-size: 0.82rem;
    white-space: nowrap;
  }

  .post-title,
  .project-title {
    border-bottom: 0;
    padding-bottom: 0;
    font-weight: 700;
  }

  .post-card::after,
  .project-card::after {
    content: "->";
    grid-column: 2;
    color: var(--accent-strong);
    opacity: 0;
    transition: opacity 160ms ease, transform 160ms ease;
  }

  .post-card:hover::after,
  .project-card:hover::after {
    opacity: 1;
    transform: translateX(3px);
  }

  .project-card {
    grid-template-columns: 1fr;
    gap: 0.35rem;
  }

  .project-desc {
    display: block;
    margin: 0;
    color: var(--muted) !important;
    font-size: 0.92rem;
    text-align: left;
  }

  article {
    max-width: 72ch;
  }

  article p:has(> strong:only-child) {
    margin: 2rem 0 0.65rem;
    color: var(--text) !important;
    font-size: 1.04rem;
    line-height: 1.35;
  }

  article p:has(> strong:only-child) strong {
    color: var(--text) !important;
    opacity: 1;
  }

  article p > strong:first-child {
    color: var(--text) !important;
    opacity: 1 !important;
    font-weight: 700;
  }

  .reading-progress {
    position: fixed;
    top: 0;
    left: 0;
    z-index: 60;
    width: 0;
    height: 3px;
    background: var(--accent);
  }

  .single-date {
    margin-top: -0.4rem;
  }

  #TableOfContents {
    margin: 1.6rem 0 2rem;
    padding: 1rem;
    border: 1px solid var(--faint);
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.78);
  }

  #TableOfContents::before {
    content: "on this page";
    display: block;
    margin-bottom: 0.6rem;
    color: var(--muted);
    font-size: 0.78rem;
  }

  #TableOfContents ul {
    margin: 0.35rem 0;
    padding-left: 1.2rem;
  }

  #TableOfContents li {
    margin: 0.35rem 0;
  }

  #TableOfContents a {
    border-bottom-width: 1px;
  }

  blockquote {
    margin: 1.4rem 0;
    padding: 0.2rem 1rem;
    border-left: 3px solid var(--blue);
    background: rgba(49, 95, 214, 0.06);
  }

  table {
    width: 100%;
    border-collapse: collapse;
    margin: 1.5rem 0;
    background-color: var(--surface);
    box-shadow: 0 8px 26px rgba(20, 20, 20, 0.04);
  }

  th,
  td {
    padding: 0.75rem;
    border: 1px solid var(--faint);
    text-align: left;
    vertical-align: top;
  }

  th {
    background-color: var(--surface-2);
  }

  .highlight {
    margin: 1.5rem 0;
  }

  .highlight pre {
    overflow-x: auto;
    margin: 0;
    padding: 1.15rem 1.3rem;
    border: 1px solid var(--faint);
    border-radius: 8px;
    background-color: #f5f5f5 !important;
    color: #333333 !important;
    line-height: 1.6;
  }

  .highlight pre::-webkit-scrollbar {
    height: 8px;
  }

  .highlight pre::-webkit-scrollbar-thumb {
    border-radius: 999px;
    background-color: #c8c8c8;
  }

  code {
    font-family: 'Roboto Mono', 'Courier New', monospace;
    font-size: 0.9em;
  }

  p code,
  li code,
  h1 code,
  h2 code,
  h3 code,
  td code {
    border-radius: 6px;
    padding: 2px 6px;
    background-color: #f0f0f0 !important;
    color: #c42323 !important;
  }

  .highlight code {
    background: transparent !important;
    color: inherit !important;
    padding: 0;
  }

  .highlight .c,
  .highlight .cm,
  .highlight .c1,
  .highlight .cs,
  .highlight .sd {
    color: #008000 !important;
    font-style: italic;
  }

  .highlight .err,
  .highlight .gd,
  .highlight .gr,
  .highlight .gt,
  .highlight .ne {
    color: #e60000 !important;
  }

  .highlight .k,
  .highlight .kc,
  .highlight .kp,
  .highlight .kr {
    color: #af00db !important;
  }

  .highlight .kd,
  .highlight .kn,
  .highlight .kt,
  .highlight .na,
  .highlight .nb,
  .highlight .ni,
  .highlight .nv,
  .highlight .bp,
  .highlight .vc,
  .highlight .vg,
  .highlight .vi,
  .highlight .vm,
  .highlight .nd,
  .highlight .nf,
  .highlight .fm,
  .highlight .nl {
    color: #0066cc !important;
  }

  .highlight .m,
  .highlight .mb,
  .highlight .mf,
  .highlight .mh,
  .highlight .mi,
  .highlight .mo,
  .highlight .il,
  .highlight .no {
    color: #ff6600 !important;
  }

  .highlight .s,
  .highlight .sa,
  .highlight .sb,
  .highlight .sc,
  .highlight .dl,
  .highlight .s2,
  .highlight .sh,
  .highlight .si,
  .highlight .sx,
  .highlight .sr,
  .highlight .s1,
  .highlight .ss {
    color: #c41a16 !important;
  }

  .highlight .nc,
  .highlight .nn,
  .highlight .nt {
    color: #008080 !important;
  }

  figure {
    margin: 1.5rem 0;
  }

  figure img,
  .clickable-img {
    display: block;
    width: 100%;
    max-width: 100%;
    height: auto;
    border-radius: 8px;
    cursor: zoom-in;
    box-shadow: 0 14px 38px rgba(20, 20, 20, 0.1);
    transition: opacity 0.2s ease, transform 0.2s ease;
  }

  figure img:hover,
  .clickable-img:hover {
    opacity: 0.92;
    transform: translateY(-2px);
  }

  .lightbox-modal {
    position: fixed;
    inset: 0;
    z-index: 9999;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    background-color: rgba(0, 0, 0, 0.82);
    animation: fadeIn 0.22s;
  }

  .lightbox-modal.active {
    display: flex;
  }

  .lightbox-content {
    position: relative;
    max-width: min(1080px, 94vw);
    max-height: 90vh;
    animation: zoomIn 0.22s;
  }

  .lightbox-content img {
    width: auto;
    max-width: 100%;
    height: auto;
    max-height: 85vh;
    border-radius: 8px;
  }

  .lightbox-close {
    position: absolute;
    top: -34px;
    right: 0;
    color: white;
    cursor: pointer;
    font-size: 28px;
    font-weight: bold;
    user-select: none;
  }

  .back-to-top {
    position: fixed;
    right: clamp(14px, 3vw, 28px);
    bottom: clamp(14px, 3vw, 28px);
    z-index: 50;
    display: grid;
    place-items: center;
    width: 42px;
    height: 42px;
    border: 1px solid var(--faint);
    border-radius: 50%;
    background: var(--surface);
    color: var(--text);
    box-shadow: var(--shadow);
    cursor: pointer;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 180ms ease, transform 180ms ease;
  }

  .back-to-top.is-visible {
    opacity: 1;
    transform: translateY(0);
  }

  footer {
    margin-top: 3.2rem;
    padding-top: 1rem;
    border-top: 1px solid var(--faint);
    text-align: center;
  }

  footer p {
    margin: 0;
    color: #8f0000 !important;
    font-size: 0.9rem;
  }

  @keyframes fadeIn {
    from {
      opacity: 0;
    }

    to {
      opacity: 1;
    }
  }

  @keyframes zoomIn {
    from {
      transform: scale(0.96);
    }

    to {
      transform: scale(1);
    }
  }

  @media (max-width: 640px) {
    body {
      padding-top: 18px;
    }

    body > header {
      position: static;
      align-items: flex-start;
      flex-direction: column;
      margin-top: -18px;
    }

    header nav {
      justify-content: flex-start;
    }

    .post-card {
      grid-template-columns: 1fr;
    }

    .post-card::after {
      grid-column: 1;
    }

    table {
      display: block;
      overflow-x: auto;
    }
  }

  @media (prefers-reduced-motion: reduce) {
    *,
    *::before,
    *::after {
      scroll-behavior: auto !important;
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
  }
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
  const progress = document.createElement('div');
  progress.className = 'reading-progress';
  document.body.appendChild(progress);

  const backToTop = document.createElement('button');
  backToTop.className = 'back-to-top';
  backToTop.type = 'button';
  backToTop.setAttribute('aria-label', 'Back to top');
  backToTop.textContent = '^';
  document.body.appendChild(backToTop);

  const updateScrollUI = function() {
    const scrollable = document.documentElement.scrollHeight - window.innerHeight;
    const ratio = scrollable > 0 ? window.scrollY / scrollable : 0;
    progress.style.width = (ratio * 100).toFixed(2) + '%';
    backToTop.classList.toggle('is-visible', window.scrollY > 420);
  };

  window.addEventListener('scroll', updateScrollUI, { passive: true });
  window.addEventListener('resize', updateScrollUI);
  updateScrollUI();

  backToTop.addEventListener('click', function() {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });

  const lightboxModal = document.createElement('div');
  lightboxModal.className = 'lightbox-modal';
  lightboxModal.innerHTML = '<div class="lightbox-content"><span class="lightbox-close">&times;</span><img id="lightbox-img" src="" alt=""></div>';
  document.body.appendChild(lightboxModal);

  document.querySelectorAll('figure img').forEach(function(img) {
    img.addEventListener('click', function() {
      document.getElementById('lightbox-img').src = this.src;
      lightboxModal.classList.add('active');
    });
  });

  document.querySelector('.lightbox-close').addEventListener('click', function() {
    lightboxModal.classList.remove('active');
  });

  lightboxModal.addEventListener('click', function(e) {
    if (e.target === this) {
      this.classList.remove('active');
    }
  });

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      lightboxModal.classList.remove('active');
    }
  });
});
</script>
