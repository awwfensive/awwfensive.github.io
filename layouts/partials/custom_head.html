<script src="https://cdn.jsdelivr.net/gh/adryd325/oneko.js@latest/oneko.js" defer data-cat="/oneko.gif"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
  :root {
    color-scheme: light;
    --bg: #ffffff;
    --surface: #fafafa;
    --text: #000000;
    --text-muted: #666666;
    --text-light: #999999;
    --border: #e0e0e0;
    --accent: #0066cc;
    --accent-hover: #0052a3;
    --green: #2d7d46;
    --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.04);
    --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
  }

  * {
    box-sizing: border-box;
  }

  html {
    scroll-behavior: smooth;
  }

  body {
    min-height: 100vh;
    max-width: 920px;
    margin: 0 auto;
    padding: 60px clamp(24px, 6vw, 80px) 100px;
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 16px;
    line-height: 1.7;
    font-weight: 400;
  }

  ::selection {
    background-color: #e6f2ff;
    color: var(--text);
  }

  h1,
  h2,
  h3,
  h4,
  h5,
  h6,
  p,
  li,
  span,
  div {
    color: var(--text);
    font-family: 'Space Mono', monospace;
  }

  h1 {
    margin: 0 0 1.5rem;
    font-size: clamp(2.2rem, 4.5vw, 2.8rem);
    line-height: 1.25;
    font-weight: 700;
    letter-spacing: -0.02em;
  }

  h2 {
    margin-top: 3rem;
    margin-bottom: 1rem;
    font-size: 1.5rem;
    font-weight: 700;
    letter-spacing: -0.01em;
  }

  h3 {
    margin-top: 2.2rem;
    margin-bottom: 0.8rem;
    font-size: 1.2rem;
    font-weight: 700;
  }

  p {
    margin: 1rem 0;
  }

  strong,
  b {
    font-weight: 700;
    color: var(--text) !important;
  }

  a {
    color: var(--accent) !important;
    text-decoration: none !important;
    border-bottom: 1px solid var(--accent);
    padding-bottom: 1px;
    transition: color 150ms ease, border-color 150ms ease;
  }

  a:hover,
  a:focus-visible {
    color: var(--accent-hover) !important;
    border-bottom-color: var(--accent-hover);
  }

  a:focus-visible,
  button:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 3px;
  }

  body > header {
    position: sticky;
    top: 0;
    z-index: 20;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 2rem;
    margin: -60px calc(clamp(24px, 6vw, 80px) * -1) 4rem;
    padding: 24px clamp(24px, 6vw, 80px);
    border-bottom: 1px solid var(--border);
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(8px);
  }

  .title {
    display: inline-flex;
    align-items: center;
    border-bottom: 0;
    padding-bottom: 0;
    white-space: nowrap;
    color: var(--text) !important;
  }

  .title h2 {
    margin: 0;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: -0.01em;
  }

  header nav {
    display: flex;
    flex-wrap: wrap;
    justify-content: flex-end;
    gap: 1.5rem;
  }

  header nav a {
    border: 0;
    padding: 0;
    color: var(--text-muted) !important;
    font-size: 0.95rem;
  }

  header nav a:hover,
  header nav a:focus-visible,
  header nav a[aria-current="page"] {
    color: var(--text) !important;
    border-bottom: 1px solid var(--text);
  }

  body > main {
    animation: page-in 320ms ease both;
  }

  @keyframes page-in {
    from {
      opacity: 0;
      transform: translateY(4px);
    }

    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .intro {
    padding: 1rem 0 2rem;
  }

  .intro h1 {
    margin-bottom: 2rem;
    max-width: 85%;
  }

  .intro-lede {
    max-width: 70ch;
    margin: 1.5rem 0;
    color: var(--text);
    font-size: 1.05rem;
    line-height: 1.75;
  }

  .status-pill {
    display: inline-flex;
    align-items: center;
    margin-top: 0.8rem;
    padding: 0.5rem 0.9rem;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--green) !important;
    font-size: 0.85rem;
    font-weight: 700;
  }

  .quick-links,
  .social-links {
    display: flex;
    flex-wrap: wrap;
    gap: 1.5rem;
    margin: 2.5rem 0;
    padding: 0;
    list-style: none;
  }

  .quick-links a,
  .social-links a {
    display: inline-flex;
    align-items: center;
    padding: 0;
    border-bottom: 1px solid var(--accent);
    font-size: 1rem;
  }

  .note {
    margin: 1.5rem 0;
    padding: 1rem 1.2rem;
    border-left: 3px solid var(--accent);
    background: var(--surface);
  }

  .experience-thread {
    position: relative;
    display: grid;
    gap: 2.5rem;
    margin: 3rem 0;
    padding-left: 24px;
  }

  .experience-thread::before {
    content: "";
    position: absolute;
    top: 8px;
    bottom: 8px;
    left: 4px;
    width: 1px;
    background: var(--border);
  }

  .thread-item {
    position: relative;
    padding: 0;
    border: 0;
    background: transparent;
  }

  .thread-item::before {
    content: "";
    position: absolute;
    top: 7px;
    left: -20px;
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: var(--bg);
    border: 2px solid var(--text);
    z-index: 1;
  }

  .thread-now::before {
    background: var(--accent);
    border-color: var(--accent);
    box-shadow: 0 0 0 4px rgba(0, 102, 204, 0.12);
  }

  .thread-kicker {
    display: block;
    margin-bottom: 0.5rem;
    color: var(--text-light) !important;
    font-size: 0.75rem;
    font-weight: 400;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .thread-item h2 {
    margin: 0 0 0.4rem;
    font-size: 1.15rem;
    font-weight: 700;
    line-height: 1.4;
  }

  .thread-item p {
    margin: 0;
    color: var(--text-muted) !important;
    font-size: 1rem;
  }

  .thread-item p a {
    color: var(--accent) !important;
  }

  .post-list,
  .project-list {
    display: grid;
    gap: 1.8rem;
    margin: 2.5rem 0 0;
    padding: 0;
    list-style: none;
  }

  .post-item,
  .project-item {
    position: relative;
  }

  .post-card,
  .project-card {
    display: grid;
    grid-template-columns: 140px 1fr;
    gap: 0.6rem 2rem;
    align-items: baseline;
    width: 100%;
    padding: 0;
    border: 0;
    background: transparent;
    transition: opacity 150ms ease;
  }

  .post-card:hover,
  .project-card:hover {
    opacity: 0.7;
  }

  .post-date,
  .single-date {
    color: var(--text-light) !important;
    font-size: 0.9rem;
    white-space: nowrap;
  }

  .post-title,
  .project-title {
    border-bottom: 0;
    padding-bottom: 0;
    color: var(--text) !important;
    font-weight: 400;
    font-size: 1.05rem;
  }

  .post-card::after,
  .project-card::after {
    display: none;
  }

  .project-card {
    grid-template-columns: 1fr;
    gap: 0.5rem;
  }

  .project-desc {
    display: block;
    margin: 0;
    color: var(--text-muted) !important;
    font-size: 1rem;
    text-align: left;
  }

  article {
    max-width: 75ch;
  }

  article p:has(> strong:only-child) {
    margin: 2.5rem 0 0.8rem;
    color: var(--text) !important;
    font-size: 1rem;
    font-weight: 700;
    line-height: 1.4;
  }

  article p:has(> strong:only-child) strong {
    color: var(--text) !important;
    font-weight: 700;
  }

  article p > strong:first-child {
    color: var(--text) !important;
    font-weight: 700;
  }

  .reading-progress {
    position: fixed;
    top: 0;
    left: 0;
    z-index: 60;
    width: 0;
    height: 2px;
    background: var(--accent);
  }

  .single-date {
    margin-top: -0.5rem;
    margin-bottom: 2rem;
  }

  #TableOfContents {
    margin: 2rem 0;
    padding: 1.2rem;
    border: 1px solid var(--border);
    background: var(--surface);
  }

  #TableOfContents::before {
    content: "Contents";
    display: block;
    margin-bottom: 0.8rem;
    color: var(--text);
    font-size: 0.8rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  #TableOfContents ul {
    margin: 0.4rem 0;
    padding-left: 1.5rem;
  }

  #TableOfContents li {
    margin: 0.4rem 0;
  }

  #TableOfContents a {
    font-size: 0.9rem;
  }

  blockquote {
    margin: 1.5rem 0;
    padding: 0.3rem 1.2rem;
    border-left: 3px solid var(--accent);
    background: var(--surface);
    color: var(--text-muted);
  }

  table {
    width: 100%;
    border-collapse: collapse;
    margin: 2rem 0;
    background-color: var(--bg);
    font-size: 0.9rem;
  }

  th,
  td {
    padding: 0.8rem;
    border: 1px solid var(--border);
    text-align: left;
    vertical-align: top;
  }

  th {
    background-color: var(--surface);
    font-weight: 700;
  }

  .highlight {
    margin: 1.5rem 0;
  }

  .highlight pre {
    overflow-x: auto;
    margin: 0;
    padding: 1.2rem;
    border: 1px solid var(--border);
    background-color: var(--surface) !important;
    color: var(--text) !important;
    line-height: 1.6;
    font-size: 0.85rem;
  }

  .highlight pre::-webkit-scrollbar {
    height: 8px;
  }

  .highlight pre::-webkit-scrollbar-thumb {
    background-color: #ccc;
  }

  code {
    font-family: 'Space Mono', 'Courier New', monospace;
    font-size: 0.9em;
  }

  p code,
  li code,
  h1 code,
  h2 code,
  h3 code,
  td code {
    padding: 2px 6px;
    background-color: var(--surface) !important;
    color: var(--text) !important;
    border: 1px solid var(--border);
  }

  .highlight code {
    background: transparent !important;
    color: inherit !important;
    padding: 0;
    border: 0;
  }

  .highlight .c,
  .highlight .cm,
  .highlight .c1,
  .highlight .cs,
  .highlight .sd {
    color: #999999 !important;
    font-style: italic;
  }

  .highlight .err,
  .highlight .gd,
  .highlight .gr,
  .highlight .gt,
  .highlight .ne {
    color: #cc0000 !important;
  }

  .highlight .k,
  .highlight .kc,
  .highlight .kp,
  .highlight .kr {
    color: #0066cc !important;
  }

  .highlight .kd,
  .highlight .kn,
  .highlight .kt,
  .highlight .na,
  .highlight .nb,
  .highlight .ni,
  .highlight .nv,
  .highlight .bp,
  .highlight .vc,
  .highlight .vg,
  .highlight .vi,
  .highlight .vm,
  .highlight .nd,
  .highlight .nf,
  .highlight .fm,
  .highlight .nl {
    color: #0066cc !important;
  }

  .highlight .m,
  .highlight .mb,
  .highlight .mf,
  .highlight .mh,
  .highlight .mi,
  .highlight .mo,
  .highlight .il,
  .highlight .no {
    color: #009999 !important;
  }

  .highlight .s,
  .highlight .sa,
  .highlight .sb,
  .highlight .sc,
  .highlight .dl,
  .highlight .s2,
  .highlight .sh,
  .highlight .si,
  .highlight .sx,
  .highlight .sr,
  .highlight .s1,
  .highlight .ss {
    color: #669900 !important;
  }

  .highlight .nc,
  .highlight .nn,
  .highlight .nt {
    color: #cc6600 !important;
  }

  figure {
    margin: 2rem 0;
  }

  figure img,
  .clickable-img {
    display: block;
    width: 100%;
    max-width: 100%;
    height: auto;
    border: 1px solid var(--border);
    cursor: zoom-in;
    transition: opacity 0.15s ease;
  }

  figure img:hover,
  .clickable-img:hover {
    opacity: 0.85;
  }

  .lightbox-modal {
    position: fixed;
    inset: 0;
    z-index: 9999;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    background-color: rgba(0, 0, 0, 0.9);
    animation: fadeIn 0.2s;
  }

  .lightbox-modal.active {
    display: flex;
  }

  .lightbox-content {
    position: relative;
    max-width: min(1080px, 94vw);
    max-height: 90vh;
    animation: zoomIn 0.2s;
  }

  .lightbox-content img {
    width: auto;
    max-width: 100%;
    height: auto;
    max-height: 85vh;
    border: 1px solid var(--border);
  }

  .lightbox-close {
    position: absolute;
    top: -36px;
    right: 0;
    color: white;
    cursor: pointer;
    font-size: 24px;
    font-weight: bold;
    user-select: none;
  }

  .back-to-top {
    position: fixed;
    right: clamp(20px, 4vw, 32px);
    bottom: clamp(20px, 4vw, 32px);
    z-index: 50;
    display: grid;
    place-items: center;
    width: 40px;
    height: 40px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    box-shadow: var(--shadow-md);
    cursor: pointer;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 150ms ease, transform 150ms ease, box-shadow 150ms ease;
  }

  .back-to-top.is-visible {
    opacity: 1;
    transform: translateY(0);
  }

  .back-to-top:hover {
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
  }

  footer {
    margin-top: 5rem;
    padding-top: 2rem;
    border-top: 1px solid var(--border);
    text-align: center;
  }

  footer p {
    margin: 0;
    color: var(--text-light) !important;
    font-size: 0.85rem;
  }

  @keyframes fadeIn {
    from {
      opacity: 0;
    }

    to {
      opacity: 1;
    }
  }

  @keyframes zoomIn {
    from {
      transform: scale(0.98);
    }

    to {
      transform: scale(1);
    }
  }

  @media (max-width: 640px) {
    body {
      padding-top: 40px;
      padding-bottom: 60px;
    }

    body > header {
      position: static;
      align-items: flex-start;
      flex-direction: column;
      margin-top: -40px;
      gap: 1rem;
    }

    header nav {
      justify-content: flex-start;
      gap: 1.2rem;
    }

    .intro h1 {
      max-width: 100%;
    }

    .experience-thread {
      padding-left: 20px;
    }

    .thread-item::before {
      left: -16px;
      width: 7px;
      height: 7px;
    }

    .post-card {
      grid-template-columns: 1fr;
      gap: 0.3rem;
    }

    .post-date {
      font-size: 0.8rem;
    }

    table {
      display: block;
      overflow-x: auto;
    }
  }

  @media (prefers-reduced-motion: reduce) {
    *,
    *::before,
    *::after {
      scroll-behavior: auto !important;
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
  }
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
  const progress = document.createElement('div');
  progress.className = 'reading-progress';
  document.body.appendChild(progress);

  const backToTop = document.createElement('button');
  backToTop.className = 'back-to-top';
  backToTop.type = 'button';
  backToTop.setAttribute('aria-label', 'Back to top');
  backToTop.textContent = '^';
  document.body.appendChild(backToTop);

  const updateScrollUI = function() {
    const scrollable = document.documentElement.scrollHeight - window.innerHeight;
    const ratio = scrollable > 0 ? window.scrollY / scrollable : 0;
    progress.style.width = (ratio * 100).toFixed(2) + '%';
    backToTop.classList.toggle('is-visible', window.scrollY > 420);
  };

  window.addEventListener('scroll', updateScrollUI, { passive: true });
  window.addEventListener('resize', updateScrollUI);
  updateScrollUI();

  backToTop.addEventListener('click', function() {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });

  const lightboxModal = document.createElement('div');
  lightboxModal.className = 'lightbox-modal';
  lightboxModal.innerHTML = '<div class="lightbox-content"><span class="lightbox-close">&times;</span><img id="lightbox-img" src="" alt=""></div>';
  document.body.appendChild(lightboxModal);

  document.querySelectorAll('figure img').forEach(function(img) {
    img.addEventListener('click', function() {
      document.getElementById('lightbox-img').src = this.src;
      lightboxModal.classList.add('active');
    });
  });

  document.querySelector('.lightbox-close').addEventListener('click', function() {
    lightboxModal.classList.remove('active');
  });

  lightboxModal.addEventListener('click', function(e) {
    if (e.target === this) {
      this.classList.remove('active');
    }
  });

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      lightboxModal.classList.remove('active');
    }
  });
});
</script>
