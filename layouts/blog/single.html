{{ define "main" }}
  <article>
    <h1>{{ .Title }}</h1>

    {{ with .Params.banner }}
      <figure class="clickable-img">
        <img src="{{ . }}" alt="{{ $.Params.bannerAlt | default $.Title }}">
      </figure>
    {{ end }}

    {{ with .TableOfContents }}
      {{ . }}
    {{ end }}

    {{ .Content }}
  </article>
{{ end }}
